<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>团队成员 · YanLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-hero { padding: calc(var(--nav-height) + 48px) 0 52px; background: var(--cream); border-bottom: 1px solid rgba(6,20,32,0.06); }
    .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .member-card { background: var(--white); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow 0.2s, transform 0.2s; }
    .member-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
    .member-body { padding: 20px 16px; text-align: center; }
    .member-avatar { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; color: #fff; font-family: var(--font-display); overflow: hidden; }
    .member-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .member-role { font-size: 0.75rem; margin-bottom: 8px; }
    .member-focus { font-size: 0.78rem; color: var(--text-light); line-height: 1.5; margin-bottom: 8px; }
    .group-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); margin: 40px 0 16px; display: flex; align-items: center; gap: 12px; }
    .group-label::after { content: ''; flex: 1; height: 1px; background: rgba(6,20,32,0.08); }
    .loading-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--tiffany-light); border-top-color: var(--tiffany); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media(max-width:600px){ .member-grid { grid-template-columns: repeat(2,1fr); gap:12px; } }
  </style>
</head>
<body class="lang-zh">
  <script src="../js/nav-footer.js"></script>

  <div class="page-hero">
    <div class="container">
      <span class="section-tag"><span data-zh>团队成员</span><span data-en>Team</span></span>
      <h1><span data-zh>我们是一家人</span><span data-en>We are family</span></h1>
      <p><span data-zh>来自五湖四海的伙伴，因为对生命科学的热爱聚在一起。</span><span data-en>Colleagues united by a passion for life sciences.</span></p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="members-container">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p><span data-zh>成员信息加载中...</span><span data-en>Loading team members...</span></p>
        </div>
      </div>
    </div>
  </section>

  <script src="../js/main.js"></script>
  <script src="../js/cms.js"></script>
  <script src="../js/sheets.js"></script>
  <script src="../js/icons.js"></script>
</body>
</html>
