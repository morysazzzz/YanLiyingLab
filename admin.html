<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YanLab 后台管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Noto Sans SC', sans-serif; background: #0D1B2A; color: #E8F4F0; min-height: 100vh; }
  .topbar { background: #0A1420; border-bottom: 1px solid rgba(129,216,208,0.15); padding: 14px 24px; display: flex; align-items: center; gap: 12px; position: fixed; top:0; left:0; right:0; z-index:100; }
  .logo { width:32px;height:32px;background:#81D8D0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D1B2A;font-size:14px; }
  .topbar-title { font-size:15px;font-weight:600;color:#fff; }
  .topbar-sub { font-size:12px;color:rgba(255,255,255,0.4);margin-left:4px; }
  .view-site { margin-left:auto;padding:7px 16px;border-radius:7px;border:1px solid rgba(129,216,208,0.3);background:transparent;color:#81D8D0;font-size:12px;cursor:pointer;text-decoration:none; }
  .view-site:hover { background:rgba(129,216,208,0.1); }
  .layout { display:grid;grid-template-columns:200px 1fr;margin-top:53px;height:calc(100vh - 53px); }
  .sidebar { background:#0A1420;border-right:1px solid rgba(129,216,208,0.1);padding:16px 0;overflow-y:auto;position:fixed;top:53px;bottom:0;width:200px; }
  .sidebar-section { font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:12px 16px 6px; }
  .sidebar-item { display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.6);border-left:2px solid transparent;transition:all 0.15s; }
  .sidebar-item:hover { color:#fff;background:rgba(129,216,208,0.06); }
  .sidebar-item.active { color:#81D8D0;border-left-color:#81D8D0;background:rgba(129,216,208,0.08); }
  .main { margin-left:200px;display:flex;flex-direction:column;height:calc(100vh - 53px); }
  .editor-area { flex:1;overflow-y:auto;padding:28px; }
  .page-title { font-size:20px;font-weight:600;color:#fff;margin-bottom:6px; }
  .page-desc { font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px; }
  .field-group { background:rgba(255,255,255,0.04);border:1px solid rgba(129,216,208,0.12);border-radius:12px;padding:20px;margin-bottom:16px; }
  .field-label { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:rgba(129,216,208,0.7);margin-bottom:10px; }
  .bilingual { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
  .input-wrap { position:relative; }
  .input-lang { position:absolute;top:8px;right:8px;font-size:9px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;pointer-events:none; }
  textarea,input[type=text] { width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#E8F4F0;font-size:13px;padding:10px 12px;font-family:inherit;resize:vertical;transition:border-color 0.15s; }
  textarea { min-height:80px; }
  textarea:focus,input[type=text]:focus { outline:none;border-color:rgba(129,216,208,0.4); }
  .card { background:rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;margin-bottom:12px;position:relative; }
  .card-header { display:flex;align-items:center;gap:10px;margin-bottom:12px; }
  .avatar-sm { width:36px;height:36px;border-radius:50%;background:#81D8D0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D1B2A;font-size:14px;flex-shrink:0; }
  .role-select { background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#E8F4F0;font-size:12px;padding:6px 10px;font-family:inherit; }
  .remove-btn { width:28px;height:28px;border-radius:6px;border:1px solid rgba(232,115,74,0.3);background:transparent;color:rgba(232,115,74,0.7);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .remove-btn:hover { background:rgba(232,115,74,0.12);color:#E8734A; }
  .add-btn { width:100%;padding:10px;border:1.5px dashed rgba(129,216,208,0.3);border-radius:8px;background:transparent;color:rgba(129,216,208,0.6);cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.15s; }
  .add-btn:hover { border-color:rgba(129,216,208,0.6);color:#81D8D0;background:rgba(129,216,208,0.05); }
  .badge-toggle { padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid;transition:all 0.15s;font-family:inherit; }
  .badge-off { border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);background:transparent; }
  .badge-on { border-color:#F5C842;color:#F5C842;background:rgba(245,200,66,0.1); }
  .photo-grid { display:grid;grid-template-columns:90px 1fr;gap:14px;align-items:start; }
  .photo-thumb { width:90px;height:90px;border-radius:8px;background:rgba(129,216,208,0.08);border:1.5px dashed rgba(129,216,208,0.2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden; }
  .photo-thumb img { width:100%;height:100%;object-fit:cover; }
  .save-bar { background:#0A1420;border-top:1px solid rgba(129,216,208,0.15);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0; }
  .save-btn { padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;background:#81D8D0;color:#0D1B2A;transition:all 0.2s; }
  .save-btn:hover { background:#9AE8E0; transform:translateY(-1px); }
  .save-btn:disabled { opacity:0.5;cursor:default;transform:none; }
  .save-hint { font-size:12px;color:rgba(255,255,255,0.35); }
  .toast { position:fixed;bottom:80px;right:24px;background:#81D8D0;color:#0D1B2A;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;transform:translateY(20px);opacity:0;transition:all 0.3s;pointer-events:none; }
  .toast.show { transform:translateY(0);opacity:1; }
  .note { background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.2);border-radius:8px;padding:12px 16px;font-size:12px;color:rgba(245,200,66,0.8);margin-bottom:20px;line-height:1.6; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Y</div>
  <div><span class="topbar-title">YanLab 后台管理</span><span class="topbar-sub">Content Manager</span></div>
  <a href="/index.html" class="view-site" target="_blank">↗ 查看网站</a>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">页面内容</div>
    <div class="sidebar-item active" data-page="home">🏠 首页</div>
    <div class="sidebar-item" data-page="pi">👩‍🔬 闫老师介绍</div>
    <div class="sidebar-item" data-page="research">🧬 研究方向</div>
    <div class="sidebar-item" data-page="team">👥 团队成员</div>
    <div class="sidebar-item" data-page="publications">📄 发表论文</div>
    <div class="sidebar-section">动态更新</div>
    <div class="sidebar-item" data-page="news">📢 新闻动态</div>
    <div class="sidebar-item" data-page="lablife">🎉 实验室生活</div>
    <div class="sidebar-section">其他信息</div>
    <div class="sidebar-item" data-page="joinus">🎓 加入我们</div>
    <div class="sidebar-item" data-page="contact">📍 联系方式</div>
  </div>

  <div class="main">
    <div class="editor-area" id="editor"></div>
    <div class="save-bar">
      <button class="save-btn" id="save-btn" onclick="save()">💾 保存内容</button>
      <span class="save-hint">内容保存在浏览器本地，下次打开自动恢复</span>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ 保存成功！</div>

<script>
// ── Default content ─────────────────────────────────────────────

    desc_en:'We unravel the genetic and epigenetic logic of early human development, helping more families realize the dream of healthy reproduction.',
  },
  pi: {

    title_zh:'研究员 · 博士生导师 · 科研处处长',
    title_en:'Principal Investigator · PhD Supervisor · Director of Research Office',
    tag1_zh:'国家杰出青年科学基金获得者', tag1_en:'NSFC Distinguished Young Scholar',

    bio_en:'Prof. Liying Yan is a Principal Investigator at the Reproductive Medicine Center, PUTH, where she also serves as Director of the Research Office. She is a recipient of the NSFC Distinguished Young Scholar Award, and has published 45 papers in top journals including Nature, Cell, and Nature Genetics.',
    quote_zh:'请在这里填写闫老师的寄语或座右铭。',
    quote_en:'A quote or message from Prof. Yan — to be filled.',
    email:'yanliying@bjmu.edu.cn',
  },
  research: { areas:[
    {icon:'🧬', title_zh:'生殖遗传与胚胎诊断', title_en:'Reproductive Genetics & Embryo Diagnosis', desc_zh:'开发基于转录组测序的胚胎着床前遗传学检测新方法，提高单基因病筛查的准确性与适用范围。', desc_en:'Developing transcriptome-based preimplantation genetic testing methods to improve accuracy and applicability for monogenic disease screening.'},
    {icon:'🔬', title_zh:'表观遗传调控机制', title_en:'Epigenetic Regulation Mechanisms', desc_zh:'系统研究人类早期胚胎及原始生殖细胞发育过程中的DNA甲基化调控机制。', desc_en:'Systematically studying DNA methylation regulation during human early embryo and primordial germ cell development.'},
    {icon:'👶', title_zh:'辅助生殖技术临床转化', title_en:'Translational Assisted Reproduction', desc_zh:'将基础研究成果成功转化为临床应用，提高辅助生殖治疗成功率。', desc_en:'Translating basic findings into clinical applications to improve ART success rates and help infertile families.'},
  ]},
  team: { members:[
    {name_zh:'闫丽盈', name_en:'Liying Yan', role:'PI', focus_zh:'生殖遗传 · 表观遗传 · 辅助生殖', focus_en:'Reproductive genetics · Epigenetics · ART', email:'yanliying@bjmu.edu.cn', photo:''},
    {name_zh:'待填写', name_en:'To be filled', role:'Postdoc', focus_zh:'研究方向待填', focus_en:'TBD', email:'', photo:''},
    {name_zh:'待填写', name_en:'To be filled', role:'PhD', focus_zh:'研究方向待填', focus_en:'TBD', email:'', photo:''},
  ]},
  publications: { papers:[
    {title:'Concurrent Preimplantation Genetic Testing and Competence Assessment of Human Embryos by Transcriptome Sequencing', authors:'Wang Y, Li Y, Zhu X, Yan L*, Qiao J*', journal:'Advanced Science', year:'2024', doi:'', cover:false, cited:false, advance:false},
  ]},
  news: { items:[
    {date:'2024-06-20', title_zh:'团队在Advanced Science发表胚胎诊断新成果', title_en:'Team publishes embryo diagnostic method in Advanced Science', desc_zh:'基于RNA转录组测序实现胚胎单基因病诊断与着床潜能同步评估。', desc_en:'Concurrent preimplantation genetic testing and competence assessment via transcriptome sequencing.', tag_zh:'论文发表', tag_en:'Publication'},
  ]},
  lablife: { photos:[
    {url:'', caption_zh:'年度团建', caption_en:'Annual retreat', category:'团建'},
    {url:'', caption_zh:'毕业季', caption_en:'Graduation', category:'毕业'},
    {url:'', caption_zh:'节日聚餐', caption_en:'Holiday dinner', category:'聚餐'},
  ]},
  joinus: {
    intro_zh:'我们欢迎充满好奇心、勤奋踏实的伙伴加入。无论你处于学术生涯的哪个阶段，都真诚欢迎你来聊聊。',
    intro_en:'We welcome curious, dedicated people at any stage of their academic career. We\'d genuinely love to hear from you.',
    phd_zh:'生命科学/医学相关背景，对基础研究有热情与执着，具备良好的学习与沟通能力。', phd_en:'Background in life sciences or medicine, passion for basic research, good communication skills.',
    postdoc_zh:'生命科学相关方向博士学位，良好的英文写作与沟通能力，具备独立科研能力。', postdoc_en:'PhD in life sciences or related fields, strong English writing and communication, ability to conduct independent research.',
  },
  contact: {
    email:'yanliying@bjmu.edu.cn',
    address_zh:'北京市海淀区花园北路49号\n北京大学第三医院 生殖医学科\n邮编：100191',
    address_en:'49 North Garden Road, Haidian District\nReproductive Medicine Center, PUTH\nBeijing 100191, China',
    dept_zh:'北京大学第三医院（北医三院）', dept_en:'Peking University Third Hospital (PUTH)',
  }
};

// Load saved or use defaults
let S = JSON.parse(localStorage.getItem('yanlab_cms') || 'null') || JSON.parse(JSON.stringify(DEFAULTS));

let cur = 'home';

// ── Helpers ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const set = (path, val) => {
  const parts = path.split('.');
  let obj = S;
  for (let i=0; i<parts.length-1; i++) obj = obj[parts[i]];
  obj[parts[parts.length-1]] = val;
};

function inp(path, value, opts={}) {
  const { ph='', multi=false, rows=3 } = opts;
  const tag = multi ? 'textarea' : 'input type="text"';
  const close = multi ? 'textarea' : 'input';
  const style = multi ? ` style="min-height:${rows*28}px"` : '';
  const val = value || '';
  return multi
    ? `<textarea${style} data-path="${path}" placeholder="${ph}" oninput="set('${path}',this.value)">${val}</textarea>`
    : `<input type="text" data-path="${path}" placeholder="${ph}" value="${val.replace(/"/g,'&quot;')}" oninput="set('${path}',this.value)">`;
}

function bi(labelZh, labelEn, pathZh, pathEn, opts={}) {
  return `<div class="field-group">
    <div class="field-label">${labelZh} / ${labelEn}</div>
    <div class="bilingual">
      <div class="input-wrap">${inp(pathZh, eval(`S.${pathZh}`), opts)}<span class="input-lang">中文</span></div>
      <div class="input-wrap">${inp(pathEn, eval(`S.${pathEn}`), opts)}<span class="input-lang">EN</span></div>
    </div>
  </div>`;
}

// ── Page renderers ────────────────────────────────────────────────
const PAGES = {
  home: () => `
    <div class="page-title">🏠 首页</div>
    <div class="page-desc">首页 Hero 区的主标语和描述文字</div>
    ${bi('主标语','Slogan','home.slogan_zh','home.slogan_en')}
    ${bi('副描述','Description','home.desc_zh','home.desc_en',{multi:true})}`,

  pi: () => `
    <div class="page-title">👩‍🔬 闫老师介绍</div>
    <div class="page-desc">关于PI页面的所有文字内容</div>
    ${bi('姓名','Name','pi.name_zh','pi.name_en')}
    ${bi('职称','Title','pi.title_zh','pi.title_en')}
    ${bi('身份标签1','Badge 1','pi.tag1_zh','pi.tag1_en')}
    ${bi('身份标签2','Badge 2','pi.tag2_zh','pi.tag2_en')}
    ${bi('个人简介','Biography','pi.bio_zh','pi.bio_en',{multi:true,rows:5})}
    ${bi('寄语/座右铭','Quote','pi.quote_zh','pi.quote_en',{multi:true})}
    <div class="field-group"><div class="field-label">联系邮箱 Email</div>${inp('pi.email',S.pi.email,{ph:'example@bjmu.edu.cn'})}</div>`,

  research: () => `
    <div class="page-title">🧬 研究方向</div>
    <div class="page-desc">三大研究方向的标题和描述</div>
    ${S.research.areas.map((a,i)=>`
    <div class="field-group">
      <div class="field-label">${a.icon} 方向 ${i+1}</div>
      <div class="bilingual" style="margin-bottom:10px;">
        <div class="input-wrap"><input type="text" value="${a.title_zh}" placeholder="标题中文" oninput="S.research.areas[${i}].title_zh=this.value"><span class="input-lang">标题中</span></div>
        <div class="input-wrap"><input type="text" value="${a.title_en}" placeholder="Title EN" oninput="S.research.areas[${i}].title_en=this.value"><span class="input-lang">Title EN</span></div>
      </div>
      <div class="bilingual">
        <div class="input-wrap"><textarea oninput="S.research.areas[${i}].desc_zh=this.value">${a.desc_zh}</textarea><span class="input-lang">描述中</span></div>
        <div class="input-wrap"><textarea oninput="S.research.areas[${i}].desc_en=this.value">${a.desc_en}</textarea><span class="input-lang">Desc EN</span></div>
      </div>
    </div>`).join('')}`,

  team: () => `
    <div class="page-title">👥 团队成员</div>
    <div class="page-desc">管理所有成员。照片填 Google Drive 链接（格式：https://drive.google.com/uc?id=文件ID）</div>
    <div id="members-list">${S.team.members.map(memberCard).join('')}</div>
    <button class="add-btn" onclick="addMember()">＋ 添加成员</button>`,

  publications: () => `
    <div class="page-title">📄 发表论文</div>
    <div class="page-desc">管理论文列表，点击徽章标记特殊论文</div>
    <div id="pubs-list">${S.publications.papers.map(pubCard).join('')}</div>
    <button class="add-btn" onclick="addPub()">＋ 添加论文</button>`,

  news: () => `
    <div class="page-title">📢 新闻动态</div>
    <div class="page-desc">发布实验室最新动态，最新的放最上面</div>
    <div id="news-list">${S.news.items.map(newsCard).join('')}</div>
    <button class="add-btn" onclick="addNews()">＋ 添加动态</button>`,

  lablife: () => `
    <div class="page-title">🎉 实验室生活</div>
    <div class="page-desc">管理 Polaroid 照片墙。图片链接格式：https://drive.google.com/uc?id=你的文件ID</div>
    <div class="note">💡 上传照片到 Google Drive → 右键 → 共享 → 任何人可查看 → 复制链接ID → 粘贴到下方</div>
    <div id="photos-list">${S.lablife.photos.map(photoCard).join('')}</div>
    <button class="add-btn" onclick="addPhoto()">＋ 添加照片</button>`,

  joinus: () => `
    <div class="page-title">🎓 加入我们</div>
    <div class="page-desc">招生信息和欢迎语</div>
    ${bi('页面介绍语','Intro','joinus.intro_zh','joinus.intro_en',{multi:true})}
    ${bi('博士生要求','PhD requirements','joinus.phd_zh','joinus.phd_en',{multi:true})}
    ${bi('博士后要求','Postdoc requirements','joinus.postdoc_zh','joinus.postdoc_en',{multi:true})}`,

  contact: () => `
    <div class="page-title">📍 联系方式</div>
    <div class="page-desc">更新实验室联系信息</div>
    <div class="field-group"><div class="field-label">联系邮箱</div>${inp('contact.email',S.contact.email)}</div>
    ${bi('实验室地址','Address','contact.address_zh','contact.address_en',{multi:true})}
    ${bi('所属机构','Institution','contact.dept_zh','contact.dept_en')}`,
};

function memberCard(m, i) {
  return `<div class="card">
    <div class="card-header">
      <div class="avatar-sm">${(m.name_zh||'?')[0]}</div>
      <input type="text" value="${m.name_zh||''}" placeholder="中文姓名" oninput="S.team.members[${i}].name_zh=this.value" style="flex:1;">
      <select class="role-select" onchange="S.team.members[${i}].role=this.value">
        ${['PI','Postdoc','PhD','Master','Undergrad','Staff'].map(r=>`<option ${m.role===r?'selected':''}>${r}</option>`).join('')}
      </select>
      <button class="remove-btn" onclick="S.team.members.splice(${i},1);render()">✕</button>
    </div>
    <div class="bilingual" style="margin-bottom:8px;">
      <input type="text" value="${m.name_en||''}" placeholder="English name" oninput="S.team.members[${i}].name_en=this.value">
      <input type="text" value="${m.email||''}" placeholder="邮箱 Email" oninput="S.team.members[${i}].email=this.value">
    </div>
    <div class="bilingual" style="margin-bottom:8px;">
      <input type="text" value="${m.focus_zh||''}" placeholder="研究方向（中文）" oninput="S.team.members[${i}].focus_zh=this.value">
      <input type="text" value="${m.focus_en||''}" placeholder="Research focus (EN)" oninput="S.team.members[${i}].focus_en=this.value">
    </div>
    <input type="text" value="${m.photo||''}" placeholder="头像链接（Google Drive: https://drive.google.com/uc?id=...）" oninput="S.team.members[${i}].photo=this.value">
  </div>`;
}

function pubCard(p, i) {
  const tog = (key, label) => `<button class="badge-toggle ${p[key]?'badge-on':'badge-off'}" onclick="S.publications.papers[${i}].${key}=!S.publications.papers[${i}].${key};render()">${label}</button>`;
  return `<div class="card">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
      ${tog('cover','📰 封面')}${tog('cited','🔥 高被引')}${tog('advance','🏆 十大进展')}
      <button class="remove-btn" style="margin-left:auto;" onclick="S.publications.papers.splice(${i},1);render()">✕</button>
    </div>
    <input type="text" value="${p.title||''}" placeholder="论文标题 Title" oninput="S.publications.papers[${i}].title=this.value" style="margin-bottom:8px;">
    <input type="text" value="${p.authors||''}" placeholder="作者列表 Authors（用**闫丽盈**加粗）" oninput="S.publications.papers[${i}].authors=this.value" style="margin-bottom:8px;">
    <div class="bilingual" style="margin-bottom:8px;">
      <input type="text" value="${p.journal||''}" placeholder="期刊 Journal" oninput="S.publications.papers[${i}].journal=this.value">
      <input type="text" value="${p.year||''}" placeholder="年份 Year" oninput="S.publications.papers[${i}].year=this.value">
    </div>
    <input type="text" value="${p.doi||''}" placeholder="DOI 链接（可选）" oninput="S.publications.papers[${i}].doi=this.value">
  </div>`;
}

function newsCard(n, i) {
  return `<div class="card">
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center;">
      <input type="text" value="${n.date||''}" placeholder="日期 2024-06-20" oninput="S.news.items[${i}].date=this.value" style="width:130px;flex-shrink:0;">
      <input type="text" value="${n.tag_zh||''}" placeholder="标签中文" oninput="S.news.items[${i}].tag_zh=this.value">
      <input type="text" value="${n.tag_en||''}" placeholder="Tag EN" oninput="S.news.items[${i}].tag_en=this.value">
      <button class="remove-btn" onclick="S.news.items.splice(${i},1);render()">✕</button>
    </div>
    <div class="bilingual" style="margin-bottom:8px;">
      <input type="text" value="${n.title_zh||''}" placeholder="标题（中文）" oninput="S.news.items[${i}].title_zh=this.value">
      <input type="text" value="${n.title_en||''}" placeholder="Title (EN)" oninput="S.news.items[${i}].title_en=this.value">
    </div>
    <div class="bilingual">
      <textarea oninput="S.news.items[${i}].desc_zh=this.value" placeholder="简介（中文）" style="min-height:60px;">${n.desc_zh||''}</textarea>
      <textarea oninput="S.news.items[${i}].desc_en=this.value" placeholder="Description (EN)" style="min-height:60px;">${n.desc_en||''}</textarea>
    </div>
  </div>`;
}

function photoCard(p, i) {
  return `<div class="card">
    <div class="photo-grid">
      <div class="photo-thumb">${p.url?`<img src="${p.url}" onerror="this.style.display='none'">`:'📸'}</div>
      <div>
        <input type="text" value="${p.url||''}" placeholder="图片链接 https://drive.google.com/uc?id=..." oninput="S.lablife.photos[${i}].url=this.value;render()" style="margin-bottom:8px;">
        <div class="bilingual">
          <input type="text" value="${p.caption_zh||''}" placeholder="说明（中文）" oninput="S.lablife.photos[${i}].caption_zh=this.value">
          <input type="text" value="${p.caption_en||''}" placeholder="Caption (EN)" oninput="S.lablife.photos[${i}].caption_en=this.value">
        </div>
      </div>
    </div>
    <button class="remove-btn" style="position:absolute;right:12px;top:12px;" onclick="S.lablife.photos.splice(${i},1);render()">✕</button>
  </div>`;
}

function addMember(){ S.team.members.push({name_zh:'新成员',name_en:'New member',role:'PhD',focus_zh:'',focus_en:'',email:'',photo:''}); render(); }
function addPub(){ S.publications.papers.unshift({title:'',authors:'',journal:'',year:new Date().getFullYear()+'',doi:'',cover:false,cited:false,advance:false}); render(); }
function addNews(){ S.news.items.unshift({date:new Date().toISOString().slice(0,10),title_zh:'',title_en:'',desc_zh:'',desc_en:'',tag_zh:'实验室动态',tag_en:'Lab Update'}); render(); }
function addPhoto(){ S.lablife.photos.push({url:'',caption_zh:'',caption_en:'',category:'日常'}); render(); }

function render() {
  $('editor').innerHTML = PAGES[cur]();
}

function showPage(name) {
  cur = name;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.toggle('active', el.dataset.page === name));
  render();
  $('editor').scrollTop = 0;
}

function save() {
  localStorage.setItem('yanlab_cms', JSON.stringify(S));
  // Also save to a global variable that other pages can read
  window.YANLAB_CONTENT = S;
  const t = $('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Sidebar click
document.querySelectorAll('.sidebar-item').forEach(el => {
  el.addEventListener('click', () => showPage(el.dataset.page));
});

render();
</script>
</body>
</html>
