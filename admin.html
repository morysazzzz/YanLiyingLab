.s-item:hover{color:#fff;background:rgba(129,216,208,0.06);}
.s-item.on{color:#81D8D0;border-left-color:#81D8D0;background:rgba(129,216,208,0.08);font-weight:500;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#editor{flex:1;overflow-y:auto;padding:24px 28px;}
#savebar{height:56px;min-height:56px;background:#060F1A;border-top:1px solid rgba(129,216,208,0.15);display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;}
#save-btn{padding:9px 24px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#81D8D0;color:#0D1B2A;transition:all 0.2s;font-family:inherit;}

.s-hint{font-size:11px;color:rgba(255,255,255,0.3);}

.iw{position:relative;}
.il{position:absolute;top:7px;right:7px;font-size:9px;color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:3px;pointer-events:none;}

textarea{min-height:72px;}
textarea:focus,input[type=text]:focus{outline:none;border-color:rgba(129,216,208,0.4);}

.xbtn:hover{background:rgba(232,115,74,0.12);color:#E8734A;}

.addbtn:hover{border-color:rgba(129,216,208,0.55);color:#81D8D0;}
.bt{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid;font-family:inherit;}
.bt-off{border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.35);background:transparent;}
.bt-on{border-color:#F5C842;color:#F5C842;background:rgba(245,200,66,0.1);}
.note{background:rgba(245,200,66,0.07);border:1px solid rgba(245,200,66,0.18);border-radius:7px;padding:10px 14px;font-size:11px;color:rgba(245,200,66,0.75);margin-bottom:16px;line-height:1.6;}
.pg{display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:start;}
.pthumb{width:80px;height:80px;border-radius:7px;background:rgba(129,216,208,0.07);border:1.5px dashed rgba(129,216,208,0.2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0;}

// Merge missing keys from DEF
function merge(target, source) {
  for (var k in source) {
    if (!(k in target)) target[k] = JSON.parse(JSON.stringify(source[k]));
    else if (typeof source[k]==='object' && !Array.isArray(source[k]) && source[k]!==null && typeof target[k]==='object') merge(target[k], source[k]);
  }
}

function v(val){ return (val||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function inp(val, expr, ph, multi, rows) {
  var h = rows?rows*26:72;
  if (multi) return '<textarea style="min-height:'+h+'px" oninput="'+expr+'" placeholder="'+(ph||'')+'">'+( val||'')+'</textarea>';
  return '<input type="text" value="'+v(val)+'" oninput="'+expr+'" placeholder="'+(ph||'')+'">';
}
function bi(lbl, vzh, ven, ezh, een, multi, rows) {
  return '<div class="fg"><div class="fl">'+lbl+'</div><div class="bi">'
    +'<div class="iw">'+inp(vzh,ezh,'中文...',multi,rows)+'<span class="il">中文</span></div>'
    +'<div class="iw">'+inp(ven,een,'English...',multi,rows)+'<span class="il">EN</span></div>'
    +'</div></div>';
}
function si(lbl, val, expr, ph) {
  return '<div class="fg"><div class="fl">'+lbl+'</div>'+inp(val,expr,ph)+'</div>';
}
