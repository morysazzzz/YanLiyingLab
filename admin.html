<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YanLab 后台管理</title>
<style>
html, body {
  margin: 0 !important;
  padding: 0 !important;
  width: 100% !important;
  height: 100% !important;
  overflow: hidden !important;
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif !important;
  background: #0D1B2A !important;
  color: #E8F4F0 !important;
  font-size: 14px !important;
  line-height: 1.5 !important;
}
*, *::before, *::after { box-sizing: border-box !important; }

#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* Top bar */
#topbar {
  height: 52px;
  min-height: 52px;
  background: #060F1A;
  border-bottom: 1px solid rgba(129,216,208,0.2);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.t-logo { width:30px;height:30px;background:#81D8D0;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D1B2A;font-size:13px;flex-shrink:0; }
.t-title { font-size:14px;font-weight:600;color:#fff; }
.t-sub { font-size:11px;color:rgba(255,255,255,0.35);margin-left:2px; }
.t-link { margin-left:auto;padding:6px 14px;border-radius:6px;border:1px solid rgba(129,216,208,0.3);background:transparent;color:#81D8D0;font-size:11px;cursor:pointer;text-decoration:none;white-space:nowrap; }

/* Body: sidebar + main */
#body {
  display: flex;
  flex: 1;
  overflow: hidden;
  width: 100%;
}

/* Sidebar */
#sidebar {
  width: 190px;
  min-width: 190px;
  background: #060F1A;
  border-right: 1px solid rgba(129,216,208,0.12);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 12px 0;
}
.s-section { font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:10px 14px 4px; }
.s-item { display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.55);border-left:2px solid transparent;transition:all 0.12s;white-space:nowrap; }
.s-item:hover { color:#fff;background:rgba(129,216,208,0.06); }
.s-item.on { color:#81D8D0;border-left-color:#81D8D0;background:rgba(129,216,208,0.08);font-weight:500; }

/* Main */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
#editor {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
}

/* Save bar */
#savebar {
  height: 56px;
  min-height: 56px;
  background: #060F1A;
  border-top: 1px solid rgba(129,216,208,0.15);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 14px;
  flex-shrink: 0;
}
#save-btn { padding:9px 24px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#81D8D0;color:#0D1B2A;transition:all 0.2s;font-family:inherit; }
#save-btn:hover { background:#9AE8E0;transform:translateY(-1px); }
.s-hint { font-size:11px;color:rgba(255,255,255,0.3); }
#toast { position:fixed;bottom:70px;right:20px;background:#81D8D0;color:#0D1B2A;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity 0.25s;z-index:999; }

/* Editor content */
.pg-title { font-size:18px;font-weight:600;color:#fff;margin-bottom:4px; }
.pg-desc { font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:20px; }
.fg { background:rgba(255,255,255,0.04);border:1px solid rgba(129,216,208,0.12);border-radius:10px;padding:16px;margin-bottom:14px; }
.fl { font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:rgba(129,216,208,0.65);margin-bottom:8px; }
.bi { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.iw { position:relative; }
.il { position:absolute;top:7px;right:7px;font-size:9px;color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:3px;pointer-events:none; }
textarea, input[type=text] {
  display:block;width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;color:#E8F4F0;font-size:12px;padding:8px 10px;font-family:inherit;
  resize:vertical;transition:border-color 0.15s;margin:0;
}
textarea { min-height:72px; }
textarea:focus, input[type=text]:focus { outline:none;border-color:rgba(129,216,208,0.4); }
.card { background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.08);border-radius:9px;padding:14px;margin-bottom:10px;position:relative; }
.ch { display:flex;align-items:center;gap:8px;margin-bottom:10px; }
.av { width:32px;height:32px;border-radius:50%;background:#81D8D0;display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D1B2A;font-size:13px;flex-shrink:0; }
select { background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#E8F4F0;font-size:12px;padding:5px 8px;font-family:inherit; }
.xbtn { width:26px;height:26px;border-radius:5px;border:1px solid rgba(232,115,74,0.3);background:transparent;color:rgba(232,115,74,0.65);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.xbtn:hover { background:rgba(232,115,74,0.12);color:#E8734A; }
.addbtn { width:100%;padding:9px;border:1.5px dashed rgba(129,216,208,0.25);border-radius:7px;background:transparent;color:rgba(129,216,208,0.55);cursor:pointer;font-size:12px;font-family:inherit;transition:all 0.15s;margin-top:4px; }
.addbtn:hover { border-color:rgba(129,216,208,0.55);color:#81D8D0; }
.bt { padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid;font-family:inherit; }
.bt-off { border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.35);background:transparent; }
.bt-on { border-color:#F5C842;color:#F5C842;background:rgba(245,200,66,0.1); }
.note { background:rgba(245,200,66,0.07);border:1px solid rgba(245,200,66,0.18);border-radius:7px;padding:10px 14px;font-size:11px;color:rgba(245,200,66,0.75);margin-bottom:16px;line-height:1.6; }
.pg { display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:start; }
.pthumb { width:80px;height:80px;border-radius:7px;background:rgba(129,216,208,0.07);border:1.5px dashed rgba(129,216,208,0.2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0; }
.pthumb img { width:100%;height:100%;object-fit:cover; }
</style>
</head>
<body>
<script>window.__ADMIN_PAGE__=true;</script>

<div id="app">
  <div id="topbar">
    <div class="t-logo">Y</div>
    <span class="t-title">YanLab 后台管理</span>
    <span class="t-sub">Content Manager</span>
    <a href="/index.html" class="t-link" target="_blank">↗ 查看网站</a>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="s-section">页面内容</div>
      <div class="s-item on" data-p="home">🏠 首页</div>
      <div class="s-item" data-p="pi">👩‍🔬 闫老师介绍</div>
      <div class="s-item" data-p="research">🧬 研究方向</div>
      <div class="s-item" data-p="team">👥 团队成员</div>
      <div class="s-item" data-p="pubs">📄 发表论文</div>
      <div class="s-section">动态更新</div>
      <div class="s-item" data-p="news">📢 新闻动态</div>
      <div class="s-item" data-p="life">🎉 实验室生活</div>
      <div class="s-section">其他</div>
      <div class="s-item" data-p="join">🎓 加入我们</div>
      <div class="s-item" data-p="contact">📍 联系方式</div>
    </div>
    <div id="main">
      <div id="editor"></div>
      <div id="savebar">
        <button id="save-btn" onclick="save()">💾 保存内容</button>
        <span class="s-hint">保存后刷新网站即可看到更新</span>
      </div>
    </div>
  </div>
</div>
<div id="toast">✅ 保存成功！</div>

<script>

  pi:{ name_zh:'闫丽盈', name_en:'Liying Yan', title_zh:'研究员 · 博士生导师 · 科研处处长', title_en:'Principal Investigator · PhD Supervisor · Director of Research Office', tag1_zh:'国家杰出青年科学基金获得者', tag1_en:'NSFC Distinguished Young Scholar', tag2_zh:'辅助生殖教育部重点实验室副主任', tag2_en:'Deputy Director, MOE Key Lab of ART', bio_zh:'闫丽盈研究员现任职于北京大学第三医院生殖医学科，担任科研处处长及辅助生殖教育部重点实验室副主任。她是国家杰出青年科学基金获得者，长期致力于人类早期胚胎发育的遗传与表观遗传调控研究。\n\n作为通讯或第一作者，她已在Nature、Cell、Nature Genetics、Molecular Cell等国际顶级期刊发表论文45篇，两次入选"中国科学十大进展"。', bio_en:'Prof. Liying Yan is a Principal Investigator at the Reproductive Medicine Center, PUTH. She is a recipient of the NSFC Distinguished Young Scholar Award, and has published 45 papers in top journals including Nature, Cell, and Nature Genetics.', quote_zh:'请在这里填写闫老师的寄语。', quote_en:"A quote from Prof. Yan — to be filled.", email:'yanliying@bjmu.edu.cn' },
  research:{ areas:[
    {icon:'🧬',title_zh:'生殖遗传与胚胎诊断',title_en:'Reproductive Genetics & Embryo Diagnosis',desc_zh:'开发基于转录组测序的胚胎着床前遗传学检测新方法，提高单基因病筛查的准确性与适用范围。',desc_en:'Developing transcriptome-based preimplantation genetic testing methods to improve accuracy and applicability.'},
    {icon:'🔬',title_zh:'表观遗传调控机制',title_en:'Epigenetic Regulation Mechanisms',desc_zh:'系统研究人类早期胚胎及原始生殖细胞发育过程中的DNA甲基化调控机制。',desc_en:'Systematically studying DNA methylation regulation during human early embryo development.'},
    {icon:'👶',title_zh:'辅助生殖技术临床转化',title_en:'Translational Assisted Reproduction',desc_zh:'将基础研究成果成功转化为临床应用，提高辅助生殖治疗成功率。',desc_en:'Translating basic findings into clinical applications to improve ART success rates.'},
  ]},
  team:{ members:[
    {name_zh:'闫丽盈',name_en:'Liying Yan',role:'PI',focus_zh:'生殖遗传 · 表观遗传',focus_en:'Reproductive genetics · Epigenetics',email:'yanliying@bjmu.edu.cn',photo:''},
    {name_zh:'待填写',name_en:'To be filled',role:'Postdoc',focus_zh:'待填',focus_en:'TBD',email:'',photo:''},
    {name_zh:'待填写',name_en:'To be filled',role:'PhD',focus_zh:'待填',focus_en:'TBD',email:'',photo:''},
  ]},
  pubs:{ papers:[
    {title:'Concurrent Preimplantation Genetic Testing and Competence Assessment of Human Embryos by Transcriptome Sequencing',authors:'Wang Y, Li Y, Zhu X, Yan L*, Qiao J*',journal:'Advanced Science',year:'2024',doi:'',cover:false,cited:false,advance:false},
  ]},
  news:{ items:[
    {date:'2024-06-20',title_zh:'团队在Advanced Science发表胚胎诊断新成果',title_en:'Team publishes embryo diagnostic method in Advanced Science',desc_zh:'基于RNA转录组测序实现胚胎单基因病诊断与着床潜能同步评估。',desc_en:'Concurrent preimplantation genetic testing and competence assessment via transcriptome sequencing.',tag_zh:'论文发表',tag_en:'Publication'},
  ]},

    {url:'',caption_zh:'年度团建',caption_en:'Annual retreat'},
    {url:'',caption_zh:'毕业季',caption_en:'Graduation'},
    {url:'',caption_zh:'节日聚餐',caption_en:'Holiday dinner'},
  ]},
  join:{ intro_zh:'我们欢迎充满好奇心、勤奋踏实的伙伴加入。', intro_en:"We welcome curious, dedicated people at any stage of their career.", phd_zh:'生命科学/医学相关背景，对基础研究有热情。', phd_en:'Background in life sciences or medicine, passion for basic research.', postdoc_zh:'生命科学相关博士学位，具备独立科研能力。', postdoc_en:'PhD in life sciences, ability to conduct independent research.' },
  contact:{ email:'yanliying@bjmu.edu.cn', address_zh:'北京市海淀区花园北路49号\n北京大学第三医院 生殖医学科\n邮编：100191', address_en:'49 North Garden Road, Haidian\nReproductive Medicine Center, PUTH\nBeijing 100191, China', dept_zh:'北京大学第三医院（北医三院）', dept_en:'Peking University Third Hospital (PUTH)' }
};

let S = JSON.parse(localStorage.getItem('yanlab_cms')||'null') || JSON.parse(JSON.stringify(DEF));
let cur = 'home';

function inp(val, fn, ph='', multi=false, rows=2) {
  const v = (val||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  if (multi) return `<textarea style="min-height:${rows*26}px" oninput="${fn}" placeholder="${ph}">${val||''}</textarea>`;
  return `<input type="text" value="${v}" oninput="${fn}" placeholder="${ph}">`;
}
function bi(lbl, vzh, ven, fzh, fen, multi=false, rows=2) {
  return `<div class="fg"><div class="fl">${lbl}</div><div class="bi">
    <div class="iw">${inp(vzh,fzh,'中文...',multi,rows)}<span class="il">中文</span></div>
    <div class="iw">${inp(ven,fen,'English...',multi,rows)}<span class="il">EN</span></div>
  </div></div>`;
}

const PAGES = {
  home: ()=> `<div class="pg-title">🏠 首页</div><div class="pg-desc">首页 Hero 区的主标语和描述</div>
    ${bi('主标语 Slogan',S.home.slogan_zh,S.home.slogan_en,"S.home.slogan_zh=this.value","S.home.slogan_en=this.value")}
    ${bi('描述文字 Description',S.home.desc_zh,S.home.desc_en,"S.home.desc_zh=this.value","S.home.desc_en=this.value",true,3)}`,

  pi: ()=> `<div class="pg-title">👩‍🔬 闫老师介绍</div><div class="pg-desc">PI介绍页的所有文字</div>
    ${bi('姓名',S.pi.name_zh,S.pi.name_en,"S.pi.name_zh=this.value","S.pi.name_en=this.value")}
    ${bi('职称',S.pi.title_zh,S.pi.title_en,"S.pi.title_zh=this.value","S.pi.title_en=this.value")}
    ${bi('标签1',S.pi.tag1_zh,S.pi.tag1_en,"S.pi.tag1_zh=this.value","S.pi.tag1_en=this.value")}
    ${bi('标签2',S.pi.tag2_zh,S.pi.tag2_en,"S.pi.tag2_zh=this.value","S.pi.tag2_en=this.value")}
    ${bi('个人简介',S.pi.bio_zh,S.pi.bio_en,"S.pi.bio_zh=this.value","S.pi.bio_en=this.value",true,5)}
    ${bi('寄语/座右铭',S.pi.quote_zh,S.pi.quote_en,"S.pi.quote_zh=this.value","S.pi.quote_en=this.value",true)}
    <div class="fg"><div class="fl">联系邮箱</div>${inp(S.pi.email,"S.pi.email=this.value","example@bjmu.edu.cn")}</div>`,

  research: ()=> `<div class="pg-title">🧬 研究方向</div><div class="pg-desc">三大研究方向</div>
    ${S.research.areas.map((a,i)=>`<div class="fg"><div class="fl">${a.icon} 方向${i+1}</div>
      <div class="bi" style="margin-bottom:8px;">
        <input type="text" value="${a.title_zh}" placeholder="标题中文" oninput="S.research.areas[${i}].title_zh=this.value">
        <input type="text" value="${a.title_en}" placeholder="Title EN" oninput="S.research.areas[${i}].title_en=this.value">
      </div><div class="bi">
        <textarea oninput="S.research.areas[${i}].desc_zh=this.value">${a.desc_zh}</textarea>
        <textarea oninput="S.research.areas[${i}].desc_en=this.value">${a.desc_en}</textarea>
      </div></div>`).join('')}`,

  team: ()=> `<div class="pg-title">👥 团队成员</div><div class="pg-desc">管理所有成员信息</div>
    <div id="ml">${S.team.members.map(mc).join('')}</div>
    <button class="addbtn" onclick="addM()">＋ 添加成员</button>`,

  pubs: ()=> `<div class="pg-title">📄 发表论文</div><div class="pg-desc">点击徽章可标记封面/高被引/十大进展</div>
    <div id="pl">${S.pubs.papers.map(pc).join('')}</div>
    <button class="addbtn" onclick="addP()">＋ 添加论文</button>`,

  news: ()=> `<div class="pg-title">📢 新闻动态</div><div class="pg-desc">实验室最新动态</div>
    <div id="nl">${S.news.items.map(nc).join('')}</div>
    <button class="addbtn" onclick="addN()">＋ 添加动态</button>`,

  life: ()=> `<div class="pg-title">🎉 实验室生活</div><div class="pg-desc">照片墙管理</div>
    <div class="note">💡 图片链接格式：https://drive.google.com/uc?id=文件ID<br>上传照片到 Google Drive → 右键共享 → 任何人可查看 → 复制链接中的ID</div>
    <div id="ll">${S.life.photos.map(lc).join('')}</div>
    <button class="addbtn" onclick="addL()">＋ 添加照片</button>`,

  join: ()=> `<div class="pg-title">🎓 加入我们</div><div class="pg-desc">招生信息</div>
    ${bi('欢迎语',S.join.intro_zh,S.join.intro_en,"S.join.intro_zh=this.value","S.join.intro_en=this.value",true)}
    ${bi('博士生要求',S.join.phd_zh,S.join.phd_en,"S.join.phd_zh=this.value","S.join.phd_en=this.value",true)}
    ${bi('博士后要求',S.join.postdoc_zh,S.join.postdoc_en,"S.join.postdoc_zh=this.value","S.join.postdoc_en=this.value",true)}`,

  contact: ()=> `<div class="pg-title">📍 联系方式</div><div class="pg-desc">更新联系信息</div>
    <div class="fg"><div class="fl">联系邮箱</div>${inp(S.contact.email,"S.contact.email=this.value")}</div>
    ${bi('地址',S.contact.address_zh,S.contact.address_en,"S.contact.address_zh=this.value","S.contact.address_en=this.value",true,3)}
    ${bi('所属机构',S.contact.dept_zh,S.contact.dept_en,"S.contact.dept_zh=this.value","S.contact.dept_en=this.value")}`,
};

function mc(m,i){
  return `<div class="card"><div class="ch">
    <div class="av">${(m.name_zh||'?')[0]}</div>
    <input type="text" value="${m.name_zh||''}" placeholder="中文姓名" oninput="S.team.members[${i}].name_zh=this.value" style="flex:1;">
    <select onchange="S.team.members[${i}].role=this.value">
      ${['PI','Postdoc','PhD','Master','Undergrad','Staff'].map(r=>`<option ${m.role===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <button class="xbtn" onclick="S.team.members.splice(${i},1);render()">✕</button>
  </div>
  <div class="bi" style="margin-bottom:8px;">
    <input type="text" value="${m.name_en||''}" placeholder="English name" oninput="S.team.members[${i}].name_en=this.value">
    <input type="text" value="${m.email||''}" placeholder="Email" oninput="S.team.members[${i}].email=this.value">
  </div>
  <div class="bi" style="margin-bottom:8px;">
    <input type="text" value="${m.focus_zh||''}" placeholder="研究方向（中文）" oninput="S.team.members[${i}].focus_zh=this.value">
    <input type="text" value="${m.focus_en||''}" placeholder="Research focus (EN)" oninput="S.team.members[${i}].focus_en=this.value">
  </div>
  <input type="text" value="${m.photo||''}" placeholder="头像链接 https://drive.google.com/uc?id=..." oninput="S.team.members[${i}].photo=this.value">
  </div>`;
}

function pc(p,i){
  const t=(k,l)=>`<button class="bt ${p[k]?'bt-on':'bt-off'}" onclick="S.pubs.papers[${i}].${k}=!S.pubs.papers[${i}].${k};render()">${l}</button>`;
  return `<div class="card">
  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">
    ${t('cover','📰 封面')}${t('cited','🔥 高被引')}${t('advance','🏆 十大进展')}
    <button class="xbtn" style="margin-left:auto;" onclick="S.pubs.papers.splice(${i},1);render()">✕</button>
  </div>
  <input type="text" value="${(p.title||'').replace(/"/g,'&quot;')}" placeholder="论文标题" oninput="S.pubs.papers[${i}].title=this.value" style="margin-bottom:7px;">
  <input type="text" value="${(p.authors||'').replace(/"/g,'&quot;')}" placeholder="作者列表" oninput="S.pubs.papers[${i}].authors=this.value" style="margin-bottom:7px;">
  <div class="bi" style="margin-bottom:7px;">
    <input type="text" value="${p.journal||''}" placeholder="期刊" oninput="S.pubs.papers[${i}].journal=this.value">
    <input type="text" value="${p.year||''}" placeholder="年份" oninput="S.pubs.papers[${i}].year=this.value">
  </div>
  <input type="text" value="${p.doi||''}" placeholder="DOI链接（可选）" oninput="S.pubs.papers[${i}].doi=this.value">
  </div>`;
}

function nc(n,i){
  return `<div class="card">
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">
    <input type="text" value="${n.date||''}" placeholder="2024-06-20" oninput="S.news.items[${i}].date=this.value" style="width:120px;flex-shrink:0;">
    <input type="text" value="${n.tag_zh||''}" placeholder="标签中文" oninput="S.news.items[${i}].tag_zh=this.value">
    <input type="text" value="${n.tag_en||''}" placeholder="Tag EN" oninput="S.news.items[${i}].tag_en=this.value">
    <button class="xbtn" onclick="S.news.items.splice(${i},1);render()">✕</button>
  </div>
  <div class="bi" style="margin-bottom:7px;">
    <input type="text" value="${(n.title_zh||'').replace(/"/g,'&quot;')}" placeholder="标题（中文）" oninput="S.news.items[${i}].title_zh=this.value">
    <input type="text" value="${(n.title_en||'').replace(/"/g,'&quot;')}" placeholder="Title (EN)" oninput="S.news.items[${i}].title_en=this.value">
  </div>
  <div class="bi">
    <textarea oninput="S.news.items[${i}].desc_zh=this.value" placeholder="简介（中文）" style="min-height:56px;">${n.desc_zh||''}</textarea>
    <textarea oninput="S.news.items[${i}].desc_en=this.value" placeholder="Description (EN)" style="min-height:56px;">${n.desc_en||''}</textarea>
  </div></div>`;
}

function lc(p,i){
  return `<div class="card"><div class="pg">
    <div class="pthumb">${p.url?`<img src="${p.url}" onerror="this.style.display='none'">`:'📸'}</div>
    <div>
      <input type="text" value="${p.url||''}" placeholder="图片链接 https://drive.google.com/uc?id=..." oninput="S.life.photos[${i}].url=this.value;render()" style="margin-bottom:7px;">
      <div class="bi">
        <input type="text" value="${p.caption_zh||''}" placeholder="说明（中文）" oninput="S.life.photos[${i}].caption_zh=this.value">
        <input type="text" value="${p.caption_en||''}" placeholder="Caption (EN)" oninput="S.life.photos[${i}].caption_en=this.value">
      </div>
    </div>
  </div>
  <button class="xbtn" style="position:absolute;right:10px;top:10px;" onclick="S.life.photos.splice(${i},1);render()">✕</button>
  </div>`;
}

function addM(){S.team.members.push({name_zh:'新成员',name_en:'New member',role:'PhD',focus_zh:'',focus_en:'',email:'',photo:''});render();}
function addP(){S.pubs.papers.unshift({title:'',authors:'',journal:'',year:new Date().getFullYear()+'',doi:'',cover:false,cited:false,advance:false});render();}
function addN(){S.news.items.unshift({date:new Date().toISOString().slice(0,10),title_zh:'',title_en:'',desc_zh:'',desc_en:'',tag_zh:'实验室动态',tag_en:'Lab Update'});render();}
function addL(){S.life.photos.push({url:'',caption_zh:'',caption_en:''});render();}

function render(){document.getElementById('editor').innerHTML=PAGES[cur]();}

function save(){
  localStorage.setItem('yanlab_cms',JSON.stringify(S));
  const t=document.getElementById('toast');
  t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}

document.querySelectorAll('.s-item').forEach(el=>{
  el.addEventListener('click',()=>{
    cur=el.dataset.p;
    document.querySelectorAll('.s-item').forEach(x=>x.classList.remove('on'));
    el.classList.add('on');
    render();
    document.getElementById('editor').scrollTop=0;
  });
});

render();

// Load saved
const saved=localStorage.getItem('yanlab_cms');
if(saved){try{S=JSON.parse(saved);render();}catch(e){}}
</script>
</body>
</html>
