// ── Image upload helpers ─────────────────────────────────────
function setupDrop(zoneId, onImage) {
  var zone = document.getElementById(zoneId);
  if (!zone) return;
  var inp = zone.querySelector('input[type=file]');
  var preview = zone.querySelector('.img-preview');
  var txt = zone.querySelector('.img-drop-text');

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result;
      if (preview) { preview.src = b64; preview.style.display = 'block'; }
      if (txt) txt.textContent = file.name;
      onImage(b64);
    };
    reader.readAsDataURL(file);
  }

  zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', function(){ zone.classList.remove('over'); });
  zone.addEventListener('drop', function(e){ e.preventDefault(); zone.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });
  if (inp) inp.addEventListener('change', function(){ handleFile(inp.files[0]); });
}

function imgDropZone(id, currentSrc, onchangeExpr) {
  var hasImg = currentSrc && currentSrc.length > 10;
  return '<div class="img-drop" id="'+id+'">'
    +(hasImg?'<img class="img-preview" style="display:block" src="'+currentSrc+'">'
            :'<img class="img-preview">')
    +'<input type="file" accept="image/*">'
    +'<div class="img-drop-icon">📷</div>'
    +'<div class="img-drop-text">'+(hasImg?'点击或拖拽替换图片':'点击或拖拽上传图片')+'</div>'
    +'</div>'
    +'<script>setupDrop("'+id+'",function(b64){'+onchangeExpr+'});<\/script>';
}
